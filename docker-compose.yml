services:
  app:
    image: personal-blog:ci
    container_name: personal-blog-app
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: personal-blog-nginx
    restart: unless-stopped
    ports:
      # Host port default to 8080 to avoid clashing with host nginx on :80
      - "${BLOG_HOST_PORT:-8080}:80"
    volumes:
      - /opt/personal-blog/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app

