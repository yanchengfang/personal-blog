server {
  listen 80;
  server_name blog.summerylaker.site;

  # ACME challenge path for certificate issuance/renewal (webroot mode compatibility).
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  # Redirect all HTTP traffic to HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name blog.summerylaker.site;

  ssl_certificate /etc/letsencrypt/live/blog.summerylaker.site/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/blog.summerylaker.site/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  # No basePath: visit domain root `/` -> redirect to default locale `/{lang}`.
  location = / {
    return 301 /zh/;
  }
  location = /zh {
    return 301 /zh/;
  }

  # Compatibility: if someone still visits the old /blog path
  location = /blog {
    return 301 /zh/blog/;
  }
  location = /blog/ {
    return 301 /zh/blog/;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward to Next.js container.
    proxy_pass http://app:3000;
  }
}

