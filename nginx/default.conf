server {
  listen 80;
  server_name blog.summerylaker.site;

  # No basePath: visit domain root `/` -> redirect to default locale `/{lang}`.
  location = / {
    return 301 /zh/;
  }
  location = /zh {
    return 301 /zh/;
  }

  # Compatibility: if someone still visits the old /blog path
  location = /blog {
    return 301 /zh/blog/;
  }
  location = /blog/ {
    return 301 /zh/blog/;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward to Next.js container.
    proxy_pass http://app:3000;
  }
}

