server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # If the site is exported with BASE_PATH=/blog, visiting / should redirect.
  location = / {
    return 301 /blog/;
  }
  location = /blog {
    return 301 /blog/;
  }

  location / {
    # Next.js static export uses directory-based routes like /blog/ -> /blog/index.html
    # This also allows visiting /blog (without trailing slash) by serving /blog/index.html.
    try_files $uri $uri/ $uri/index.html =404;
  }
}

