# 静态站点：pnpm build（output: export）→ 打包 out/ → 同步到 VPS 的 /var/www/personal-blog（nginx 由你自行配置）
name: Personal Blog Deploy (Static Export)

on:
  push:
    branches: [master]

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 与本地 .env.production 等价：构建前写入，供 next build 加载 NEXT_PUBLIC_*
      - name: Write .env.production for build
        run: |
          {
            echo "NEXT_PUBLIC_GISCUS_REPO=${{ secrets.NEXT_PUBLIC_GISCUS_REPO }}"
            echo "NEXT_PUBLIC_GISCUS_REPOSITORY_ID=${{ secrets.NEXT_PUBLIC_GISCUS_REPOSITORY_ID }}"
            echo "NEXT_PUBLIC_GISCUS_CATEGORY=${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY }}"
            echo "NEXT_PUBLIC_GISCUS_CATEGORY_ID=${{ secrets.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}"
          } > .env.production

      - name: Build static export
        env:
          STATIC_EXPORT: "true"
          BASE_PATH: ${{ secrets.BASE_PATH }}
        run: pnpm run build

      - name: Package out directory
        run: |
          test -d out
          tar -czf site.tgz -C out .

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: site.tgz
          target: /tmp/personal-blog-deploy

      - name: Deploy static files on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            TARGET="/var/www/personal-blog"
            TMP="/tmp/personal-blog-deploy/site.tgz"

            sudo mkdir -p "$TARGET"
            sudo tar -xzf "$TMP" -C "$TARGET"
            sudo rm -f "$TMP"
            # 静态资源由 nginx 提供；若需特定用户请改下面一行
            sudo chown -R www-data:www-data "$TARGET" 2>/dev/null || true
            echo "Deployed to $TARGET"

      - name: Health check (static index)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            set -e
            test -f /var/www/personal-blog/zh/index.html && echo "OK: zh index exists"
