name: Personal_blog Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build project (validation only)
        run: |
          npm ci
          npm run build
        # 此步骤仅用于提前发现构建错误，构建产物不会被使用

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e  # 遇到错误立即退出

            # 定义项目路径（请替换为你的实际路径）
            PROJECT_DIR="/var/www/personal-blog"
            REPO_URL="git@github.com:yanchengfang/personal-blog.git"  # 请替换为你的仓库 SSH 地址

            echo "PATH: $PATH"
            command -v node || true
            command -v npm || true
            if command -v node > /dev/null 2>&1; then
              echo "Node: $(node -v) ($(node -p 'process.execPath'))"
            else
              echo "Node: not found"
            fi
            if command -v npm > /dev/null 2>&1; then
              echo "NPM: $(npm -v) ($(npm config get prefix))"
            else
              echo "NPM: not found"
            fi

            NODE_MAJOR=0
            if command -v node > /dev/null 2>&1; then
              NODE_MAJOR="$(node -p "parseInt(process.versions.node.split('.')[0], 10)")"
            fi

            if [ "$NODE_MAJOR" -lt 20 ]; then
              export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
              if [ -s "$NVM_DIR/nvm.sh" ]; then
                . "$NVM_DIR/nvm.sh"
                nvm use 22 || (nvm install 22 && nvm use 22)
              fi
              export PATH="/usr/local/bin:$PATH"
              if command -v node > /dev/null 2>&1; then
                NODE_MAJOR="$(node -p "parseInt(process.versions.node.split('.')[0], 10)")"
                echo "Node(after): $(node -v) ($(node -p 'process.execPath'))"
              fi
            fi

            if [ "$NODE_MAJOR" -lt 20 ]; then
              echo "Node.js 版本过低(需要 >= 20),请先在服务器升级 Node 后再部署。"
              exit 1
            fi

            # 如果目录不存在，则克隆仓库
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "目录不存在，正在克隆仓库..."
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "目录已存在，进入目录并拉取最新代码..."
            fi

            cd "$PROJECT_DIR"

            # 拉取最新代码（如果是刚克隆的,git pull 也可以工作）
            git pull origin master

            # 安装依赖并构建
            npm ci
            npm run build

            # PM2 进程管理
            if pm2 describe personal-blog > /dev/null 2>&1; then
              pm2 reload personal-blog --update-env
            else
              PORT=3000 pm2 start npm --name personal-blog -- run serve
            fi

            pm2 save
